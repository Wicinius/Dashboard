<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winicius</title>
    <link rel="stylesheet" href="assets/css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
</head>

<body>
    <div class="container">
        <h1>Dashboard de Vendas</h1>
        <div class="cardsGrid">
            <div class="card">
                <h3>VENDAS</h3>
                <p class="valor">R$ 10000</p>
            </div>
            <div class="card">
                <h3>TICKET MÉDIO</h3>
                <p class="valor">R$ 1000</p>
            </div>
            <div class="card">
                <h3>CLIENTES NOVOS</h3>
                <p class="valor">100</p>
            </div>
            <div class="card">
                <h3>CONVERSÃO</h3>
                <p class="valor">10 %</p>
            </div>
        </div>
        <div style="background: rgb(49, 47, 47);; padding: 20px; border-radius: 12px;">
                    <h2>Gráfico</h2>
            <div id="meuGrafico"></div>
        </div>
        <div>
            <h2>Últimas vendas</h2>
            <table class="tabelaVendas">
                <thead>
                    <tr><th>Cliente</th><th>Valor</th><th class="status">Status</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>


    <script src="assets/js/dashboard.js"></script>
</body>

</html>
